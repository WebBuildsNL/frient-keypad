<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- device body (tall wall unit) -->
  <rect x="18" y="6" width="64" height="88" rx="11" ry="11" fill="none" stroke="#1E90FF" stroke-width="5"/>
  <!-- LED indicator strip -->
  <rect x="28" y="14" width="44" height="6" rx="3" ry="3" fill="#1E90FF"/>
  <!-- numeric keys (3 columns x 4 rows, outlined) -->
  <rect x="26" y="30" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="39" y="30" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="52" y="30" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="26" y="43" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="39" y="43" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="52" y="43" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="26" y="56" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="39" y="56" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="52" y="56" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="26" y="69" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="39" y="69" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <rect x="52" y="69" width="10" height="10" rx="2.5" fill="none" stroke="#1E90FF" stroke-width="2.5"/>
  <!-- function column (arm/disarm, filled) -->
  <rect x="66" y="30" width="10" height="10" rx="2.5" fill="#1E90FF"/>
  <rect x="66" y="43" width="10" height="10" rx="2.5" fill="#1E90FF"/>
  <rect x="66" y="56" width="10" height="10" rx="2.5" fill="#1E90FF"/>
  <rect x="66" y="69" width="10" height="10" rx="2.5" fill="#1E90FF"/>
</svg>
